<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラブファイル - Home</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-coral: #FF8E8E;
            --text-dark: #333333;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        header {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 80px;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo img {
            max-width: 200px;
            height: auto;
        }

        .header-right {
            text-align: right;
            font-size: 14px;
            color: var(--text-dark);
            font-weight: bold;
            line-height: 1.4;
            letter-spacing: 0.15em;
        }

        .hero-section {
            padding: 0 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 80px;
        }

        .main-card {
            background: linear-gradient(135deg, #E86FA4, #ffd5df);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
            width: 100%;
            max-width: 1000px;
            height: auto;
            min-height: 380px;
            color: var(--text-dark);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.938);
            position: relative;
        }

        .card-left {
            flex: 1.3;
            z-index: 2;
        }

        .card-left h1 {
            font-size: 3.2rem;
            margin: 0;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .card-left p {
            font-size: 1.4rem;
            margin-top: 20px;
            opacity: 0.9;
            font-weight: 400;
        }

        .start-btn {
            display: inline-block;
            margin-top: 35px;
            padding: 16px 60px;
            background-color: var(--text-dark);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            background-color: #000;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .card-right-image {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
        }

        .card-right-image img {
            max-width: 100%;
            height: auto;
            max-height: 350px;
            object-fit: contain;
            filter: drop-shadow(5px 5px 15px rgba(0, 0, 0, 0.08));
        }

        /* 画像下のテキスト用スタイル */
        .image-caption {
            font-size: 14px;
            color: #000000;
            font-weight: normal;
            margin-top: 10px;
            text-align: center;
        }

        .external-links-container {
            max-width: 1150px;
            width: 100%;
            text-align: left;
            margin: 20px auto 0;
        }

        .external-link-item {
            color: #000000;
            font-size: 14px;
            margin: 5px 0;
        }

        .external-link-item a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .external-link-item a:hover {
            text-decoration: underline;
        }

        @media screen and (max-width: 768px) {
            body {
                justify-content: flex-start;
                overflow-y: auto;
                height: auto;
            }

            header {
                position: static;
                flex-direction: column;
                padding: 20px;
                align-items: center;
            }

            .logo img {
                max-width: 140px;
                margin-bottom: 10px;
            }

            .header-right {
                text-align: center;
                font-size: 12px;
            }

            .hero-section {
                padding: 0 10px;
                margin-top: 20px;
            }

            .main-card {
                flex-direction: column;
                padding: 30px 20px;
                border-radius: 20px;
                width: 100%;
                max-width: 100%;
                height: auto;
                min-height: auto;
            }

            .card-left {
                width: 100%;
                text-align: center;
                margin-bottom: 20px;
            }

            .card-left h1 {
                font-size: 2.2rem;
                line-height: 1.3;
            }

            .card-left p {
                font-size: 1.1rem;
                margin-top: 15px;
            }

            .start-btn {
                margin-top: 25px;
                padding: 12px 40px;
                font-size: 1.0rem;
            }

            .card-right-image {
                width: 100%;
                justify-content: center;
            }

            .card-right-image img {
                max-width: 80%;
                max-height: 250px;
                margin: 0 auto;
                border-radius: 15px;
            }

            /* 👇 追加：スマホで下のリンク集も中央に寄せる */
            .external-links-container {
                text-align: center;
                padding-bottom: 40px;
                /* 一番下の余白を確保 */
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="/">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="ラブファイル">
            </a>
        </div>
        <div class="header-right">
            FIND YOUR DESTINY<br>
            YOUR PERFECT MATCH AWAITS
        </div>
    </header>

    <section class="hero-section">
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">

            <div class="main-card">
                <div class="card-left">
                    <h1>本格相性診断<br>ラブファイル</h1>
                    <p>運命の相手との出会いを<br>科学する</p>
                    <a href="/diagnose" class="start-btn">診断をはじめる</a>
                </div>
                <div class="card-right-image">
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <img src="{{ url_for('static', filename='images/couple.png') }}" alt="Main Visual">
                        <p class="image-caption">著作権やばかったら教えて↑</p>
                    </div>
                </div>
            </div>

            <div class="external-links-container">
                <p class="external-link-item">mbti診断は<a href="https://www.16personalities.com/ja"
                        target="_blank">こちら</a></p>
                <p class="external-link-item">ラブタイプ16診断は<a href="https://lovetype.org/test" target="_blank">こちら</a></p>
                <p class="external-link-item">文句があるなら<a href="/feedback">こちら</a>(フィードバック)</p>
            </div>

        </div>
    </section>

</body>

</html>
